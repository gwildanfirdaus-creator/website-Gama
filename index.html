<!DOCTYPE html>
<html>
<head><link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <title>Profile Saya</title>

    <style>
        body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #667eea, #764ba2);
    text-align: center;
        }

        .navbar {
    background: rgba(0,0,0,0.7);
    padding: 15px;
    backdrop-filter: blur(10px);
        }

        .navbar a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            margin-top: 30px;
        }

        .card {
    background-color: white;
    padding: 25px;
    margin: auto;
    width: 85%;
    border-radius: 20px;

    box-shadow: 0 10px 25px rgba(0,0,0,0.2);

    opacity: 0;
    transform: translateY(20px);
    animation: muncul 1s ease forwards;
    transition: 0.3s;
        }

        @keyframes muncul {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        img {
    width: 150px;
    border-radius: 50%;
    border: 4px solid #764ba2;
        }

        button {
    background: linear-gradient(to right, #667eea, #764ba2);
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    margin: 5px;
    transition: 0.3s;
        }

        button:hover {
            background-color: darkblue;
            transform: scale(1.1);
        }

        .card:hover {
            transform: scale(1.03);
        }

        .social {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        /* DARK MODE */
        .dark {
            background-color: #121212;
            color: white;
        }

        .dark .card {
            background-color: #1e1e1e;
        }

        .dark button {
            background-color: gray;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
</div>

<div class="container">
    <div class="card">

        <img src="image/foto.jpg">

        <h1>Gama alok</h1>
        <p>Aing suka bermain badminton, epep, and learn English 🔥</p>

        <button onclick="halo()">Kenalan Yuk</button>

        <br><br>

        <div class="social">
            <a href="https://wa.me/6285706405497">
                <button>WhatsApp</button>
            </a>

            <a href="https://instagram.com/idcbruh013">
                <button>Instagram</button>
            </a>
        </div>

        <br><br>

        <button onclick="darkMode()">🌙 Dark Mode</button>

    </div>
</div>

<script>
function halo() {
    alert("Halo! Senang kenal kamu");
}

function darkMode() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
